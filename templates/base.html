<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Local Chat{% endblock %}</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        bg: '#F4F5F7',
                        panel: '#FFFFFF',
                        border: '#E4E7EC',
                        ink: '#1F2430',
                        sub: '#6B7280',
                        brand: '#4F6BFF',
                        brandsoft: '#EEF1FF',
                        bubble: '#F0F2F6',
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #E4E7EC; border-radius: 4px; }
    </style>
</head>
<body class="bg-bg min-h-screen font-sans antialiased text-ink">

    <nav class="border-b border-border bg-panel">
        <div class="max-w-5xl mx-auto px-6 h-14 flex items-center justify-between">
            <div class="flex items-center gap-2">
                <div class="h-7 w-7 rounded-lg bg-brand flex items-center justify-center text-white text-sm font-semibold">L</div>
                <span class="font-semibold text-sm">Local Chat</span>
            </div>
            <div class="text-sm text-sub" id="sessionStatus">
                desconectado
            </div>
        </div>
    </nav>

    <main class="max-w-5xl mx-auto px-6 py-8">
        {% block content %}
        {% endblock %}
    </main>

</body>
</html>

{% extends "base.html" %}
{% block title %}Local Chat{% endblock %}

{% block content %}
<div class="grid grid-cols-1 lg:grid-cols-[300px_1fr] gap-4 h-[calc(100vh-120px)] lg:h-[calc(100vh-150px)]">

    <aside id="chatSidebar" class="bg-panel border border-border rounded-2xl flex flex-col overflow-hidden h-full lg:flex">
        <div class="p-4 border-b border-border flex items-center justify-between">
            <span class="font-semibold text-sm">Conversas</span>
            <button id="newChatBtn" title="Nova conversa"
                class="h-8 w-8 flex items-center justify-center rounded-full bg-brandsoft text-brand hover:bg-brand hover:text-white transition text-lg leading-none">
                +
            </button>
        </div>
        <div id="chatList" class="flex-1 overflow-y-auto">
            <p class="text-sub text-sm p-4">Carregando...</p>
        </div>
        <div class="p-3 border-t border-border flex items-center justify-between">
            <span class="text-sm text-sub" id="currentUserLabel">-</span>
            <button id="logoutBtn" class="text-sm text-red-500 hover:underline">Sair</button>
        </div>
    </aside>

    <section id="chatWindow" class="bg-panel border border-border rounded-2xl flex flex-col overflow-hidden h-full hidden lg:flex">
        <div id="emptyState" class="flex-1 flex items-center justify-center text-center px-6">
            <div>
                <p class="text-sub text-sm font-medium">Nenhuma conversa selecionada</p>
                <p class="text-sub/70 text-sm mt-1">Escolha uma conversa ou inicie uma nova</p>
            </div>
        </div>

        <div id="activeChat" class="flex-1 flex flex-col min-h-0 hidden">
            <div class="px-5 py-3.5 border-b border-border flex items-center justify-between">
                <div class="flex items-center gap-3">
                    <button id="backBtn" class="lg:hidden p-1 -ml-1 text-sub hover:text-ink transition" title="Voltar para a lista">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-5 h-5">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 19.5L8.25 12l7.5-7.5" />
                        </svg>
                    </button>
                    <div>
                        <p id="chatTitle" class="font-semibold text-sm">-</p>
                        <p id="chatSubtitle" class="text-sub text-xs mt-0.5">-</p>
                    </div>
                </div>
            </div>

            <div id="messageList" class="flex-1 overflow-y-auto px-5 py-4 space-y-3"></div>

            <form id="messageForm" class="border-t border-border p-3 flex gap-2">
                <input id="messageInput" type="text" autocomplete="off"
                    placeholder="Escreva uma mensagem..."
                    class="flex-1 bg-bg border border-border rounded-xl px-4 py-2.5 text-sm text-ink placeholder-sub/60 focus:outline-none focus:ring-2 focus:ring-brand/30 focus:border-brand">
                <button type="submit"
                    class="bg-brand text-white font-medium text-sm rounded-xl px-5 hover:opacity-90 transition">
                    Enviar
                </button>
            </form>
        </div>
    </section>
</div>

<div id="newChatModal" class="hidden fixed inset-0 bg-black/40 flex items-center justify-center p-6 z-10">
    <div class="bg-panel border border-border rounded-2xl p-5 w-full max-w-sm shadow-lg">
        <div class="flex items-center justify-between mb-4">
            <h2 class="font-semibold text-sm">Nova conversa</h2>
            <button id="closeModalBtn" class="text-sub hover:text-ink text-lg leading-none">&times;</button>
        </div>

        <input id="userSearchInput" type="text" placeholder="Buscar por nome de usuário..."
            class="w-full bg-bg border border-border rounded-xl px-3.5 py-2.5 text-sm text-ink placeholder-sub/60 focus:outline-none focus:ring-2 focus:ring-brand/30 focus:border-brand mb-3">

        <div id="selectedUsersBar" class="flex flex-wrap gap-1.5 mb-3 hidden"></div>

        <div id="userResultsList" class="max-h-56 overflow-y-auto border border-border rounded-xl divide-y divide-border"></div>

        <input id="chatNameInput" type="text" placeholder="Nome do grupo (opcional, se 2+ pessoas)"
            class="w-full bg-bg border border-border rounded-xl px-3.5 py-2.5 text-sm text-ink placeholder-sub/60 focus:outline-none focus:ring-2 focus:ring-brand/30 focus:border-brand mt-3 hidden"
            id="chatNameInput">

        <p id="modalError" class="text-red-500 text-xs mt-2 hidden"></p>

        <button id="confirmModalBtn" disabled
            class="w-full bg-brand text-white font-medium rounded-xl py-2.5 text-sm mt-4 hover:opacity-90 transition disabled:opacity-40 disabled:cursor-not-allowed">
            Iniciar conversa
        </button>
    </div>
</div>

<script>
const API = window.location.origin + '/api';
const token = localStorage.getItem('lc_token');
const currentUser = JSON.parse(localStorage.getItem('lc_user') || 'null');

if (!token || !currentUser) {
    window.location.href = '/login/';
}

document.getElementById('sessionStatus').textContent = currentUser.username;
document.getElementById('currentUserLabel').textContent = '@' + currentUser.username;

function authHeaders(extra) {
    return Object.assign({ 'Authorization': 'Token ' + token }, extra || {});
}

let chats = [];
let activeChatId = null;
let chatSocket = null;
let activeChatMessages = [];
let selectedUsers = [];
let searchDebounce = null;

function connectWebSocket() {
    if (!token) return;
    const wsScheme = window.location.protocol === 'https:' ? 'wss' : 'ws';
    const wsUrl = `${wsScheme}://${window.location.host}/ws/chat/?token=${token}`;
    
    chatSocket = new WebSocket(wsUrl);

    chatSocket.onmessage = function(e) {
        try {
            const data = JSON.parse(e.data);
            if (data.type === 'chat_message') {
                if (data.message.chatId === activeChatId) {
                    appendMessage(data.message);
                }
                loadChats();
            } else if (data.type === 'chat_created') {
                loadChats();
            }
        } catch (err) {
            console.error("Erro ao processar mensagem WebSocket:", err);
        }
    };

    chatSocket.onclose = function(e) {
        console.log('Conexão WebSocket global fechada. Reconectando em 3s...');
        setTimeout(connectWebSocket, 3000);
    };

    chatSocket.onerror = function(err) {
        console.error('Erro no WebSocket global:', err);
    };
}

function stringToColor(str) {
    let hash = 0;
    for (let i = 0; i < str.length; i++) {
        hash = str.charCodeAt(i) + ((hash << 5) - hash);
    }
    const colors = [
        '#4F6BFF', '#22C55E', '#EAB308', '#EC4899', '#3B82F6', 
        '#A855F7', '#F97316', '#EF4444', '#14B8A6', '#06B6D4'
    ];
    const index = Math.abs(hash) % colors.length;
    return colors[index];
}

async function apiFetch(path, options) {
    const response = await fetch(API + path, options);
    if (response.status === 401) {
        localStorage.removeItem('lc_token');
        localStorage.removeItem('lc_user');
        window.location.href = '/login/';
        return null;
    }
    return response;
}

function chatDisplayName(chat) {
    if (chat.name) return chat.name;
    const others = chat.participants.filter(p => p.id !== currentUser.id);
    return others.map(p => p.username).join(', ') || 'Conversa';
}

async function loadChats() {
    const response = await apiFetch('/chats/', { headers: authHeaders() });
    if (!response) return;
    const data = await response.json();
    chats = data.chats;
    renderChatList();
}

function renderChatList() {
    const listEl = document.getElementById('chatList');
    if (chats.length === 0) {
        listEl.innerHTML = '<p class="text-sub text-sm p-4">Nenhuma conversa ainda</p>';
        return;
    }
    listEl.innerHTML = '';
    chats.forEach(chat => {
        const item = document.createElement('button');
        const isActive = chat.id === activeChatId;
        item.className = 'w-full text-left px-4 py-3 border-b border-border/60 hover:bg-bg transition flex items-center gap-3 ' + (isActive ? 'bg-brandsoft' : '');
        
        const displayName = chatDisplayName(chat);
        const color = stringToColor(displayName);
        const initial = displayName.charAt(0).toUpperCase();
        item.innerHTML = `
            <div class="h-9 w-9 rounded-full text-white flex items-center justify-center text-sm font-semibold shrink-0" style="background-color: ${color}">${initial}</div>
            <div class="overflow-hidden">
                <p class="text-sm font-medium truncate">${displayName}</p>
                <p class="text-sub text-xs mt-0.5">${chat.isGroup ? chat.participants.length + ' participantes' : 'Conversa privada'}</p>
            </div>
        `;
        item.addEventListener('click', () => openChat(chat.id));
        listEl.appendChild(item);
    });
}

async function openChat(chatId) {
    activeChatId = chatId;
    renderChatList();

    // Transição visual no mobile para focar na conversa
    if (window.innerWidth < 1024) {
        const sidebar = document.getElementById('chatSidebar');
        const windowEl = document.getElementById('chatWindow');
        sidebar.classList.add('hidden');
        sidebar.classList.remove('flex');
        windowEl.classList.remove('hidden');
        windowEl.classList.add('flex');
    }

    const chat = chats.find(c => c.id === chatId);
    document.getElementById('emptyState').classList.add('hidden');
    document.getElementById('activeChat').classList.remove('hidden');
    document.getElementById('chatTitle').textContent = chatDisplayName(chat);
    document.getElementById('chatSubtitle').textContent = chat.participants.map(p => '@' + p.username).join(', ');

    await loadMessages();
}

// Retorna para a lista de conversas no mobile
function showSidebarOnMobile() {
    if (window.innerWidth < 1024) {
        const sidebar = document.getElementById('chatSidebar');
        const windowEl = document.getElementById('chatWindow');
        
        sidebar.classList.remove('hidden');
        sidebar.classList.add('flex');
        
        windowEl.classList.add('hidden');
        windowEl.classList.remove('flex');
    }
    
    activeChatId = null;
    renderChatList();
}

document.getElementById('backBtn').addEventListener('click', showSidebarOnMobile);

async function loadMessages() {
    if (!activeChatId) return;
    const response = await apiFetch(`/chats/${activeChatId}/messages/`, { headers: authHeaders() });
    if (!response) return;
    const data = await response.json();
    activeChatMessages = data.messages;
    renderMessages(activeChatMessages);
}

function renderMessages(messages) {
    const listEl = document.getElementById('messageList');
    const wasAtBottom = listEl.scrollTop + listEl.clientHeight >= listEl.scrollHeight - 40;

    listEl.innerHTML = '';
    messages.forEach(msg => {
        const isMine = msg.senderId === currentUser.id;
        const wrapper = document.createElement('div');
        wrapper.className = 'flex ' + (isMine ? 'justify-end' : 'justify-start');

        const time = new Date(msg.createdAt).toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });

        wrapper.innerHTML = `
            <div class="max-w-[70%] ${isMine ? 'bg-brand text-white' : 'bg-bubble text-ink'} rounded-2xl px-4 py-2.5">
                ${!isMine ? `<p class="text-brand text-xs font-medium mb-0.5">${msg.senderUsername}</p>` : ''}
                <p class="text-sm whitespace-pre-wrap break-words">${escapeHtml(msg.content)}</p>
                <p class="${isMine ? 'text-white/70' : 'text-sub'} text-[11px] mt-1">${time}</p>
            </div>
        `;
        listEl.appendChild(wrapper);
    });

    if (wasAtBottom || messages.length <= 1) {
        listEl.scrollTop = listEl.scrollHeight;
    }
}

function appendMessage(msg) {
    if (msg.chatId !== activeChatId) return;
    if (activeChatMessages.some(m => m.id === msg.id)) return;
    activeChatMessages.push(msg);
    renderMessages(activeChatMessages);
}

function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}

document.getElementById('messageForm').addEventListener('submit', (event) => {
    event.preventDefault();
    const input = document.getElementById('messageInput');
    const content = input.value.trim();
    if (!content || !activeChatId) return;

    if (chatSocket && chatSocket.readyState === WebSocket.OPEN) {
        chatSocket.send(JSON.stringify({ chatId: activeChatId, content: content }));
        input.value = '';
    } else {
        console.error("Conexão WebSocket não está ativa.");
    }
});

const modal = document.getElementById('newChatModal');
const userSearchInput = document.getElementById('userSearchInput');
const userResultsList = document.getElementById('userResultsList');
const selectedUsersBar = document.getElementById('selectedUsersBar');
const chatNameInput = document.getElementById('chatNameInput');
const confirmModalBtn = document.getElementById('confirmModalBtn');

function openModal() {
    selectedUsers = [];
    userSearchInput.value = '';
    document.getElementById('modalError').classList.add('hidden');
    chatNameInput.value = '';
    chatNameInput.classList.add('hidden');
    confirmModalBtn.disabled = true;
    renderSelectedUsers();
    loadAllUsers();
    modal.classList.remove('hidden');
}

document.getElementById('newChatBtn').addEventListener('click', openModal);
document.getElementById('closeModalBtn').addEventListener('click', () => modal.classList.add('hidden'));

async function loadAllUsers() {
    const response = await apiFetch('/users/', { headers: authHeaders() });
    if (!response) return;
    const data = await response.json();
    renderUserResults(data.users);
}

async function searchUsers(query) {
    if (!query) {
        loadAllUsers();
        return;
    }
    const response = await apiFetch(`/users/search/?q=${encodeURIComponent(query)}`, { headers: authHeaders() });
    if (!response) return;
    const data = await response.json();
    renderUserResults(data.users);
}

userSearchInput.addEventListener('input', () => {
    clearTimeout(searchDebounce);
    const query = userSearchInput.value.trim();
    searchDebounce = setTimeout(() => searchUsers(query), 250);
});

function renderUserResults(users) {
    const availableUsers = users.filter(u => !selectedUsers.some(s => s.id === u.id));
    if (availableUsers.length === 0) {
        userResultsList.innerHTML = '<p class="text-sub text-sm p-3">Nenhum usuário encontrado</p>';
        return;
    }
    userResultsList.innerHTML = '';
    availableUsers.forEach(user => {
        const item = document.createElement('button');
        item.className = 'w-full text-left px-3 py-2.5 hover:bg-bg transition flex items-center gap-2.5';
        const color = stringToColor(user.username);
        item.innerHTML = `
            <div class="h-7 w-7 rounded-full text-white flex items-center justify-center text-xs font-semibold" style="background-color: ${color}">${user.username.charAt(0).toUpperCase()}</div>
            <span class="text-sm">${user.username}</span>
        `;
        item.addEventListener('click', () => selectUser(user));
        userResultsList.appendChild(item);
    });
}

function selectUser(user) {
    selectedUsers.push(user);
    userSearchInput.value = '';
    renderSelectedUsers();
    loadAllUsers();
    confirmModalBtn.disabled = selectedUsers.length === 0;
    chatNameInput.classList.toggle('hidden', selectedUsers.length < 2);
}

function removeUser(userId) {
    selectedUsers = selectedUsers.filter(u => u.id !== userId);
    renderSelectedUsers();
    loadAllUsers();
    confirmModalBtn.disabled = selectedUsers.length === 0;
    chatNameInput.classList.toggle('hidden', selectedUsers.length < 2);
}

function renderSelectedUsers() {
    if (selectedUsers.length === 0) {
        selectedUsersBar.classList.add('hidden');
        selectedUsersBar.innerHTML = '';
        return;
    }
    selectedUsersBar.classList.remove('hidden');
    selectedUsersBar.innerHTML = '';
    selectedUsers.forEach(user => {
        const chip = document.createElement('span');
        chip.className = 'inline-flex items-center gap-1.5 bg-brandsoft text-brand text-xs font-medium rounded-full px-3 py-1';
        chip.innerHTML = `${user.username} <button class="hover:text-red-500">&times;</button>`;
        chip.querySelector('button').addEventListener('click', () => removeUser(user.id));
        selectedUsersBar.appendChild(chip);
    });
}

confirmModalBtn.addEventListener('click', async () => {
    const errorEl = document.getElementById('modalError');
    errorEl.classList.add('hidden');

    const recipientIds = selectedUsers.map(u => u.id);
    const name = chatNameInput.value.trim();

    const response = await apiFetch('/chats/create/', {
        method: 'POST',
        headers: authHeaders({ 'Content-Type': 'application/json' }),
        body: JSON.stringify({ recipientIds, name: name || null }),
    });
    const data = await response.json();

    if (!response.ok) {
        errorEl.textContent = data.error || 'Erro ao criar conversa.';
        errorEl.classList.remove('hidden');
        return;
    }

    modal.classList.add('hidden');
    await loadChats();
    openChat(data.id);
});

document.getElementById('logoutBtn').addEventListener('click', () => {
    localStorage.removeItem('lc_token');
    localStorage.removeItem('lc_user');
    window.location.href = '/login/';
});

loadChats();
connectWebSocket();
</script>
{% endblock %}

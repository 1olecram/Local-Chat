{% extends "base.html" %}
{% block title %}Entrar — Local Chat{% endblock %}

{% block content %}
<div class="max-w-sm mx-auto mt-12">

    <div class="mb-8 text-center">
        <div class="h-12 w-12 rounded-2xl bg-brand mx-auto flex items-center justify-center text-white text-xl font-semibold mb-3">L</div>
        <h1 class="text-xl font-semibold">Bem-vindo ao Local Chat</h1>
        <p class="text-sub text-sm mt-1">Entre ou crie uma conta para começar</p>
    </div>

    <div class="bg-panel border border-border rounded-2xl p-6 shadow-sm">

        <div class="flex gap-1 mb-6 bg-bg rounded-xl p-1">
            <button id="tabLogin" class="flex-1 py-2 rounded-lg text-sm font-medium bg-panel text-ink shadow-sm transition">Entrar</button>
            <button id="tabRegister" class="flex-1 py-2 rounded-lg text-sm font-medium text-sub transition">Criar conta</button>
        </div>

        <form id="authForm" class="space-y-4">
            <div>
                <label class="block text-xs font-medium text-sub mb-1.5" for="username">Nome de usuário</label>
                <input id="username" type="text" autocomplete="username" required
                    class="w-full bg-bg border border-border rounded-xl px-3.5 py-2.5 text-sm text-ink placeholder-sub/60 focus:outline-none focus:ring-2 focus:ring-brand/30 focus:border-brand"
                    placeholder="ex: alice">
            </div>
            <div>
                <label class="block text-xs font-medium text-sub mb-1.5" for="password">Senha</label>
                <input id="password" type="password" autocomplete="current-password" required
                    class="w-full bg-bg border border-border rounded-xl px-3.5 py-2.5 text-sm text-ink placeholder-sub/60 focus:outline-none focus:ring-2 focus:ring-brand/30 focus:border-brand"
                    placeholder="mínimo 8 caracteres">
            </div>

            <button type="submit" id="submitBtn"
                class="w-full bg-brand text-white font-medium text-sm rounded-xl py-2.5 hover:opacity-90 transition">
                Entrar
            </button>

            <p id="formError" class="text-red-500 text-xs hidden"></p>
        </form>
    </div>

    <div class="mt-6 bg-panel border border-border rounded-2xl p-5 text-center shadow-sm">
        <p class="text-xs font-semibold text-sub mb-3">Acesse pelo celular</p>
        <div class="flex justify-center mb-2">
            <img id="qrCodeImg" src="" alt="QR Code" class="w-40 h-40 border border-border p-1.5 rounded-xl bg-white">
        </div>
        <p class="text-[11px] text-sub/70 select-all break-all" id="qrUrlLabel">-</p>
    </div>
</div>

<script>
const API = window.location.origin + '/api';

const tabLogin = document.getElementById('tabLogin');
const tabRegister = document.getElementById('tabRegister');
const submitBtn = document.getElementById('submitBtn');
const form = document.getElementById('authForm');
const errorEl = document.getElementById('formError');

let mode = 'login';

function setMode(newMode) {
    mode = newMode;
    const isLogin = mode === 'login';
    tabLogin.className = isLogin
        ? 'flex-1 py-2 rounded-lg text-sm font-medium bg-panel text-ink shadow-sm transition'
        : 'flex-1 py-2 rounded-lg text-sm font-medium text-sub transition';
    tabRegister.className = !isLogin
        ? 'flex-1 py-2 rounded-lg text-sm font-medium bg-panel text-ink shadow-sm transition'
        : 'flex-1 py-2 rounded-lg text-sm font-medium text-sub transition';
    submitBtn.textContent = isLogin ? 'Entrar' : 'Criar conta';
    errorEl.classList.add('hidden');
}

tabLogin.addEventListener('click', () => setMode('login'));
tabRegister.addEventListener('click', () => setMode('register'));

if (localStorage.getItem('lc_token')) {
    window.location.href = '/chat/';
}

form.addEventListener('submit', async (event) => {
    event.preventDefault();
    errorEl.classList.add('hidden');
    submitBtn.disabled = true;
    submitBtn.textContent = mode === 'login' ? 'Entrando...' : 'Criando...';

    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value;
    const endpoint = mode === 'login' ? '/auth/login/' : '/auth/register/';

    try {
        const response = await fetch(API + endpoint, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, password }),
        });
        const data = await response.json();

        if (!response.ok) {
            errorEl.textContent = data.error || 'Erro inesperado.';
            errorEl.classList.remove('hidden');
            return;
        }

        localStorage.setItem('lc_token', data.token);
        localStorage.setItem('lc_user', JSON.stringify(data.user));
        window.location.href = '/chat/';
    } catch (err) {
        errorEl.textContent = 'Não foi possível conectar ao servidor.';
        errorEl.classList.remove('hidden');
    } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = mode === 'login' ? 'Entrar' : 'Criar conta';
    }
});

// Gerar QR Code dinamicamente com base na URL atual de acesso (útil para o Ngrok)
const currentUrl = window.location.href;
document.getElementById('qrCodeImg').src = `https://api.qrserver.com/v1/create-qr-code/?size=160x160&data=${encodeURIComponent(currentUrl)}`;
document.getElementById('qrUrlLabel').textContent = currentUrl;
</script>
{% endblock %}
